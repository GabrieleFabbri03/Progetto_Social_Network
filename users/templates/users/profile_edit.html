{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Modifica la tua Biografia</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Salva</button>
            <a href="{% url 'profile' user.username %}" class="btn btn-secondary">Annulla</a>
        </form>
    </div>
</div>
{% endblock %}
