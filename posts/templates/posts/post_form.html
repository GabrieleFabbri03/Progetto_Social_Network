{% extends 'base.html' %}

{% block title %}Modifica Post - SocialPPM{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h2 class="mb-4">Modifica il tuo post</h2>
        <div class="card shadow-sm border-primary">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.testo }}
                    <div class="mt-3 text-end">
                        <a href="{% url 'feed' %}" class="btn btn-outline-secondary">Annulla</a>
                        <button type="submit" class="btn btn-primary">Salva Modifiche</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
